name: link-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly link check on Mondays at 12:00 UTC.
    - cron: "0 12 * * 1"
  workflow_dispatch:

jobs:
  links:
    name: Markdown link check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress --max-concurrency 4 './**/*.md'
          fail: true
